# ====================================================
# 🐰 CodeRabbit 설정 파일
# ====================================================

language: "ko-KR"                  # 리뷰 응답 언어: 한국어

reviews:
  profile: "chill"                 # 리뷰 어조 ("assertive": 엄격, "chill": 친근하고 부드러움)
  request_review_on_forks: true    # Fork된 PR도 자동 리뷰 활성화
  require_approval_by_all: false   # 모든 리뷰어 승인 없이도 CodeRabbit 리뷰 달도록 설정
  support_dark_mode: true          # GitHub 다크모드 대응 마크다운 최적화

  # ─── 리뷰 세부 설정 ───────────────────────────────
  auto_review:
    enabled: true                  # 자동 리뷰 활성화
    drafts: false                  # 드래프트 PR은 리뷰 제외
    base_branches:
      - "main"
      - "develop"                  # 리뷰 대상 브랜치 (필요에 따라 추가)

  # ─── 리뷰 제외 파일 패턴 ─────────────────────────
  path_filters:
    - "!dist/**"                   # 빌드 결과물 제외
    - "!build/**"                  # 빌드 결과물 제외
    - "!node_modules/**"           # 의존성 폴더 제외
    - "!.next/**"                  # Next.js 빌드 파일 제외
    - "!target/**"                 # Java/Maven 빌드 결과물 제외
    - "!.gradle/**"                # Gradle 캐시 제외
    - "!package-lock.json"         # NPM 잠금 파일 제외
    - "!yarn.lock"                 # Yarn 잠금 파일 제외
    - "!pnpm-lock.yaml"            # PNPM 잠금 파일 제외
    - "!**/*.md"                   # 마크다운 문서 제외
    - "!**/*.min.js"               # 압축된 JS 파일 제외
    - "!**/*.min.css"              # 압축된 CSS 파일 제외

# ====================================================
# 📝 PR 요약 설정
# ====================================================
summary:
  enabled: true                    # PR 변경 사항 자동 요약 활성화
  auto_generate_titles: true       # AI가 PR 제목 자동 추천

# ====================================================
# 💬 채팅 & 댓글 설정
# ====================================================
chat:
  auto_reply: true                 # CodeRabbit 멘션 시 자동 답변 활성화
