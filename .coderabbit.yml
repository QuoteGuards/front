reviews:
  profile: "chill"                 # 리뷰 어조 설정 ("assertive": 엄격함, "chill": 친근하고 부드러움)
  request_review_on_forks: true    # ⭐ [필수] 팀원들이 Fork해서 보낸 PR도 자동 리뷰 활성화
  require_approval_by_all: false  # 모든 리뷰어의 승인이 없어도 CodeRabbit이 리뷰를 달도록 설정
  support_dark_mode: true          # GitHub 다크모드 사용자를 위한 마크다운 최적화

  # 🔍 리뷰에서 제외할 파일 패턴 설정 (불필요한 AI 크레딧 낭비 방지)
  path_filters:
    - "!dist/**/*"                 # 빌드 결과물 제외
    - "!node_modules/**/*"         # 의존성 폴더 제외
    - "!.next/**/*"                # Next.js 빌드 파일 제외 (사용하는 프레임워크에 맞게 조절)
    - "!package-lock.json"         # 패키지 잠금 파일 제외
    - "!yarn.lock"                 # 패키지 잠금 파일 제외
    - "!pnpm-lock.yaml"            # 패키지 잠금 파일 제외
    - "!**/*.md"                   # 마크다운 문서 제외

# 📝 PR 요약 기능 설정
summary:
  enabled: true                    # PR이 올라오면 AI가 변경 사항을 한눈에 보게 요약문 자동 작성
  auto_generate_titles: true       # AI가 변경 사항을 분석해서 PR 제목도 자동으로 추천

# 💬 자동 댓글 생성 스타일
chat:
  auto_reply: true
