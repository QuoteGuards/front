name: Docker Build & Push

# main 브랜치에 push되면 프론트엔드 Docker 이미지를 빌드해 GHCR에 푸시하고,
# 배포 서버에 SSH로 접속해 새 이미지로 컨테이너를 갱신한다.
# 프론트엔드에는 별도 테스트 라이브러리가 없으므로 lint만 빌드 전 검증으로 실행한다.

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: quoteguards/front

concurrency:
  group: docker-build-push-front-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  build-and-push:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to server
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # GHCR 패키지(quoteguards/front)를 public으로 설정했으므로 배포 서버에서
      # 별도 docker login 없이 바로 pull 가능하다.
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            # deploy/.env의 FRONTEND_IMAGE를 이번 커밋 SHA 태그로 갱신해
            # docker-compose.yml이 정확히 이 빌드를 pull하도록 고정한다(롤백 시 이전 SHA로 되돌리면 됨).
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
            if grep -q '^FRONTEND_IMAGE=' .env; then
              sed -i "s#^FRONTEND_IMAGE=.*#FRONTEND_IMAGE=${IMAGE}#" .env
            else
              echo "FRONTEND_IMAGE=${IMAGE}" >> .env
            fi
            docker compose pull front
            docker compose up -d front
            docker image prune -f
