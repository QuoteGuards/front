name: 📝 작업 (Task)
description: 개발 작업, 리팩토링, 문서 작업 등을 등록할 때 사용하는 템플릿입니다.
title: "[TASK] "
labels: ["task"]
body:
  - type: markdown
    attributes:
      value: |
        작업 내용을 구체적으로 작성해 주세요. 📌

  - type: dropdown
    id: type
    attributes:
      label: 🏷️ 작업 유형
      description: 어떤 종류의 작업인가요?
      options:
        - 기능 개발 (Feature)
        - 리팩토링 (Refactoring)
        - 문서 작업 (Docs)
        - 테스트 작성 (Test)
        - 환경 설정 (Config/Setup)
        - 기타 (Other)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 📋 작업 설명
      description: 수행해야 할 작업을 명확하게 설명해 주세요.
      placeholder: 이번 작업에서 무엇을 해야 하나요?
    validations:
      required: true

  - type: textarea
    id: checklist
    attributes:
      label: ✅ 작업 체크리스트
      description: 세부 작업 항목을 작성해 주세요.
      placeholder: |
        - [ ] 작업 항목 1
        - [ ] 작업 항목 2
        - [ ] 작업 항목 3
    validations:
      required: false

  - type: textarea
    id: reference
    attributes:
      label: 🔗 참고 자료 (선택사항)
      description: 관련 문서, 링크, 이슈 번호 등을 작성해 주세요.
      placeholder: |
        - 관련 이슈: #
        - 참고 문서: